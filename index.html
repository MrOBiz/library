<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="./script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <table>
        <legend>MY LIBRARY</legend>
        <thead>
            <tr>
                <th>TITLE</th>
                <th>AUTHOR</th>
                <th>PAGES</th>
                <th>STATUS</th>
                <th>ID</th>
            </tr>
        </thead>
        <tbody class="t-body">
        </tbody>
        <tfoot>
            <tr>
                <td colspan="5">Copyright O.B. 2026</td>
            </tr>
        </tfoot>
    </table>
    <button command="show-modal" commandfor="dialog-box">NEW BOOK</button>
    <dialog id="dialog-box">
        <form>
            <label for="title">Book title:</label>
            <input type="text" id="title" name="b-title">

            <label for="author">Book author:</label>
            <input type="text" id="author" name="b-author">

            <label for="pages">Number of pages:</label>
            <input type="text" id="pages" name="b-pages">

            <label for="read">Read/not read:</label>
            <input type="text" id="read" name="b-read">
        </form>
        <button command="close" commandfor="dialog-box">CONFIRM</button>
    </dialog>
</body>
</html>
